name: Nightly Upgrade

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: nightly-upgrade
  cancel-in-progress: true

jobs:
  upgrade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Upgrade Astro
        run: pnpm dlx @astrojs/upgrade --yes

      - name: Verify changes
        run: |
          pnpm install
          pnpm run check
          pnpm run pack:check

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/update-astro
          assignees: eliancodes
          commit-message: 'ci: update Astro'
          title: 'ci: update Astro'
          body: Update Astro and related packages to the latest compatible versions.
          labels: ci
